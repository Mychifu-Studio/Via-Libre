name: Build and Release on PR Merge

on:
  pull_request:
    types: [closed]
    branches:
      - main

permissions:
  contents: write 

jobs:
  tag_build_and_release:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    
    steps:
      - name: Checking out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Creating git tag
        id: tag-creator
        uses: David-Lor/action-tag-on-pr-merge@main
        with:
          push-tag: true
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Creating environnement
        if: steps.tag-creator.outputs.tag != '' 
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Installing dependencies
        if: steps.tag-creator.outputs.tag != ''
        run: |
          python -m pip install --upgrade pip
          pip install panda3d setuptools
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          
      - name: Building executable
        if: steps.tag-creator.outputs.tag != ''
        run: python setup.py bdist_apps
        
      - name: Zipping files
        if: steps.tag-creator.outputs.tag != ''
        run: |
          cd build/win_amd64/
          zip -r ../../game-executable-${{ steps.tag-creator.outputs.tag }}.zip ./*
          
      - name: Creating release
        if: steps.tag-creator.outputs.tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag-creator.outputs.tag }}
          files: game-executable-${{ steps.tag-creator.outputs.tag }}.zip
          generate_release_notes: true
          prerelease: ${{ contains(steps.tag-creator.outputs.tag, '-') }}